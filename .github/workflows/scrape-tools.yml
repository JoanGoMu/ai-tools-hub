name: Daily Tool Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: npm install --no-save tsx cheerio rss-parser

      - name: Run Product Hunt scraper
        run: npx tsx scripts/scrapers/product-hunt.ts
        continue-on-error: true  # Don't fail the whole job if one scraper breaks

      - name: Run RSS feed scraper
        run: npx tsx scripts/scrapers/rss-feeds.ts
        continue-on-error: true

      - name: Auto-generate comparison pages
        run: npx tsx scripts/generators/generate-comparisons.ts
        continue-on-error: true

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: automated tool data update'
          file_pattern: 'data/**/*.json'
          add_options: '--all'
          commit_user_name: 'AI Tools Hub Bot'
          commit_user_email: 'bot@aitoolshub.pages.dev'
