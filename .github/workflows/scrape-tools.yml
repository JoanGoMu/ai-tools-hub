name: Daily Tool Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC (best effort - GitHub may delay)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: npm install --no-save tsx cheerio rss-parser @anthropic-ai/sdk

      - name: Run RSS feed scraper
        run: npx tsx scripts/scrapers/rss-feeds.ts
        continue-on-error: true

      - name: Run Product Hunt scraper
        run: npx tsx scripts/scrapers/product-hunt.ts
        continue-on-error: true

      - name: Auto-generate comparison pages
        run: npx tsx scripts/generators/generate-comparisons.ts
        continue-on-error: true

      - name: Run blog ideas scraper
        run: npx tsx scripts/scrapers/blog-ideas.ts
        continue-on-error: true

      - name: Generate new tool pages from Product Hunt suggestions
        run: npx tsx scripts/generators/generate-tools.ts
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate blog posts from ideas
        run: npx tsx scripts/generators/generate-blog-posts.ts
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/

          # Build commit message from bot log (written by generators)
          if [ -f /tmp/bot-log.txt ] && [ -s /tmp/bot-log.txt ]; then
            COMMIT_MSG="bot: $(date +%Y-%m-%d) daily update

$(cat /tmp/bot-log.txt)"
          else
            COMMIT_MSG="chore: daily scrape update $(date +%Y-%m-%d)"
          fi

          git diff --staged --quiet || git commit -m "$COMMIT_MSG" && git push
