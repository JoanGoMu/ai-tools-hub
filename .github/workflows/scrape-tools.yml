name: Daily Tool Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC (best effort - GitHub may delay)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: npm install --no-save tsx cheerio rss-parser @anthropic-ai/sdk

      - name: Clear run log (keeps history in bot-log.txt)
        run: echo "" > data/bot-log-latest.txt

      - name: Run RSS feed scraper
        run: npx tsx scripts/scrapers/rss-feeds.ts
        continue-on-error: true

      - name: Run Product Hunt scraper
        run: npx tsx scripts/scrapers/product-hunt.ts
        continue-on-error: true

      - name: Auto-generate comparison pages
        run: npx tsx scripts/generators/generate-comparisons.ts
        continue-on-error: true

      - name: Run blog ideas scraper
        run: npx tsx scripts/scrapers/blog-ideas.ts
        continue-on-error: true

      - name: Generate new tool pages from Product Hunt suggestions
        run: npx tsx scripts/generators/generate-tools.ts
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate blog posts from ideas
        run: npx tsx scripts/generators/generate-blog-posts.ts
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/

          # Build commit message file from bot log written by generators
          if [ -f data/bot-log-latest.txt ] && [ -s data/bot-log-latest.txt ]; then
            echo "bot: $(date +%Y-%m-%d) daily update" > /tmp/commit-msg.txt
            echo "" >> /tmp/commit-msg.txt
            cat data/bot-log-latest.txt >> /tmp/commit-msg.txt
          else
            echo "chore: daily scrape update $(date +%Y-%m-%d)" > /tmp/commit-msg.txt
          fi

          git diff --staged --quiet || (git commit -F /tmp/commit-msg.txt && git push)
