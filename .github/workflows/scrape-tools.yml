name: Daily Tool Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC (best effort - GitHub may delay)
  workflow_dispatch:        # Manual trigger from GitHub UI
  push:
    branches: [main]        # Backup: also runs on every push to main

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: npm install --no-save tsx cheerio rss-parser

      - name: Run RSS feed scraper
        run: npx tsx scripts/scrapers/rss-feeds.ts
        continue-on-error: true

      - name: Auto-generate comparison pages
        run: npx tsx scripts/generators/generate-comparisons.ts
        continue-on-error: true

      - name: Run blog ideas scraper
        run: npx tsx scripts/scrapers/blog-ideas.ts
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: automated tool data update" && git push)
